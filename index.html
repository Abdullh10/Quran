<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة حفظ جزء عم - المساعد الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f4f8;
            color: #2d3748;
        }
        .quran-font {
            font-family: 'Amiri', serif;
        }
        .surah-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .surah-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .custom-checkbox:checked + label {
            background-color: #48bb78;
            color: white;
        }
        .badge-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <div id="capture-area">
        <!-- Header -->
        <header class="bg-emerald-700 text-white py-8 px-4 shadow-lg mb-8 relative overflow-hidden">
            <div class="max-w-6xl mx-auto relative z-10">
                <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
                    
                    <!-- Student Info -->
                    <div class="flex flex-col md:flex-row gap-4 w-full lg:w-auto no-print">
                        <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md flex-1">
                            <label class="block text-xs text-emerald-200 mb-1">اسم الطالب</label>
                            <input type="text" id="studentName" oninput="saveAllData()" placeholder="اكتب اسمك هنا..." 
                                   class="bg-transparent border-b border-emerald-400 focus:border-yellow-400 outline-none w-full text-xl font-bold placeholder:text-emerald-300">
                        </div>
                        <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md min-w-[150px]">
                            <label class="block text-xs text-emerald-200 mb-1">المرحلة الدراسية</label>
                            <input type="text" id="studentLevel" oninput="saveAllData()" placeholder="مثلاً: الصف الخامس" 
                                   class="bg-transparent border-b border-emerald-400 focus:border-yellow-400 outline-none w-full text-lg placeholder:text-emerald-300">
                        </div>
                    </div>

                    <!-- Title & Global Progress -->
                    <div class="text-center">
                        <h1 class="text-3xl md:text-4xl font-extrabold mb-4 quran-font">مُتابعة حفظ جُزء عمّ</h1>
                        <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-sm inline-block min-w-[280px]">
                            <div class="flex justify-between mb-2 items-center">
                                <span class="text-sm font-bold">الإنجاز الكلي</span>
                                <span id="total-percent" class="text-xl font-black">0%</span>
                            </div>
                            <div class="w-full bg-white/20 rounded-full h-3">
                                <div id="total-progress-bar" class="bg-yellow-400 h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
                            </div>
                            <div class="flex gap-2 mt-4 no-print">
                                <button onclick="exportToPDF()" class="flex-1 px-3 py-2 bg-emerald-600 border border-emerald-400 text-white rounded-full text-xs font-bold hover:bg-emerald-500 transition flex items-center justify-center gap-1">
                                   <span>تحميل PDF 📄</span>
                                </button>
                                <button onclick="clearProgress()" class="px-3 py-2 bg-red-600/20 text-red-100 rounded-full text-[10px] font-bold hover:bg-red-600/40 transition">
                                   تصفير 🗑️
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4">
            <!-- Search & Filters -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 no-print">
                <div class="relative w-full md:w-96">
                    <input type="text" id="searchSurah" oninput="handleSearch(this.value)" placeholder="ابحث عن سورة..." class="w-full p-3 pr-10 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-emerald-500">
                    <span class="absolute right-3 top-3 text-gray-400">🔍</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="filterSurahs('all')" class="px-4 py-2 bg-white rounded-lg shadow-sm hover:bg-emerald-50 text-sm font-bold">الكل</button>
                    <button onclick="filterSurahs('completed')" class="px-4 py-2 bg-white rounded-lg shadow-sm hover:bg-emerald-50 text-sm font-bold text-emerald-600">المحفوظ</button>
                </div>
            </div>

            <!-- Surahs Grid -->
            <div id="surah-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards injected here -->
            </div>
        </main>
    </div>

    <!-- Badge Selector Modal (Per Surah) -->
    <div id="badge-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <h2 id="badge-modal-title" class="text-xl font-bold text-emerald-800 mb-4">تحفيز للسورة</h2>
            <p class="text-sm text-gray-500 mb-6">اختر وساماً تشجيعياً لهذه السورة:</p>
            
            <div class="grid grid-cols-4 gap-4 mb-8">
                <button onclick="assignBadgeToSurah('⭐')" class="p-4 bg-gray-50 hover:bg-yellow-100 rounded-2xl text-3xl transition">⭐</button>
                <button onclick="assignBadgeToSurah('🏆')" class="p-4 bg-gray-50 hover:bg-yellow-100 rounded-2xl text-3xl transition">🏆</button>
                <button onclick="assignBadgeToSurah('💎')" class="p-4 bg-gray-50 hover:bg-yellow-100 rounded-2xl text-3xl transition">💎</button>
                <button onclick="assignBadgeToSurah('🏅')" class="p-4 bg-gray-50 hover:bg-yellow-100 rounded-2xl text-3xl transition">🏅</button>
                <button onclick="assignBadgeToSurah('✨')" class="p-4 bg-gray-50 hover:bg-yellow-100 rounded-2xl text-3xl transition">✨</button>
                <button onclick="assignBadgeToSurah('💪')" class="p-4 bg-gray-50 hover:bg-yellow-100 rounded-2xl text-3xl transition">💪</button>
                <button onclick="assignBadgeToSurah('🎯')" class="p-4 bg-gray-50 hover:bg-yellow-100 rounded-2xl text-3xl transition">🎯</button>
                <button onclick="assignBadgeToSurah(null)" class="p-4 bg-red-50 hover:bg-red-100 rounded-2xl text-xl transition text-red-500">🚫</button>
            </div>

            <button onclick="closeBadgeModal()" class="w-full py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition">إلغاء</button>
        </div>
    </div>

    <!-- AI & Information Modal (Expanded) -->
    <div id="ai-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm no-print">
        <div class="bg-white rounded-3xl p-8 max-w-2xl w-full max-h-[85vh] overflow-y-auto shadow-2xl relative">
            <button onclick="closeAIModal()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600 text-2xl font-bold">✕</button>
            
            <div id="ai-loading" class="hidden py-10 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mx-auto"></div>
                <p class="mt-4 text-emerald-600 font-bold">جاري استحضار المعلومات من المساعد الذكي...</p>
            </div>

            <div id="ai-content-container" class="hidden">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-emerald-100 p-3 rounded-2xl text-3xl" id="ai-modal-icon">📖</div>
                    <div>
                        <h2 id="ai-modal-surah-name" class="text-2xl font-bold text-emerald-800 quran-font">اسم السورة</h2>
                        <span id="ai-modal-type" class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-bold">مكية</span>
                    </div>
                </div>

                <div class="space-y-6">
                    <!-- Tafsir Section -->
                    <div class="bg-slate-50 p-5 rounded-2xl border-r-4 border-emerald-500">
                        <h4 class="text-emerald-700 font-bold mb-2 flex items-center gap-2">
                             <span>تفسير ميسر</span> 💡
                        </h4>
                        <p id="ai-content-tafsir" class="text-gray-700 leading-relaxed text-sm"></p>
                    </div>

                    <!-- Asbab Nuzul Section -->
                    <div class="bg-amber-50 p-5 rounded-2xl border-r-4 border-amber-500">
                        <h4 class="text-amber-700 font-bold mb-2 flex items-center gap-2">
                            <span>سبب النزول</span> 📜
                        </h4>
                        <p id="ai-content-reason" class="text-gray-700 leading-relaxed text-sm"></p>
                    </div>

                    <!-- AI Memory Tips -->
                    <div class="bg-sky-50 p-5 rounded-2xl border-r-4 border-sky-500">
                        <h4 class="text-sky-700 font-bold mb-2 flex items-center gap-2">
                            <span>نصيحة ذكية للحفظ</span> ✨
                        </h4>
                        <p id="ai-content-tips" class="text-gray-700 leading-relaxed text-sm italic"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        // القائمة مرتبة تنازلياً من سورة الناس إلى النبأ
        const surahs = [
            { id: 114, name: "الناس", verses: 6 }, { id: 113, name: "الفلق", verses: 5 },
            { id: 112, name: "الإخلاص", verses: 4 }, { id: 111, name: "المسد", verses: 5 },
            { id: 110, name: "النصر", verses: 3 }, { id: 109, name: "الكافرون", verses: 6 },
            { id: 108, name: "الكوثر", verses: 3 }, { id: 107, name: "الماعون", verses: 7 },
            { id: 106, name: "قريش", verses: 4 }, { id: 105, name: "الفيل", verses: 5 },
            { id: 104, name: "الهمزة", verses: 9 }, { id: 103, name: "العصر", verses: 3 },
            { id: 102, name: "التكاثر", verses: 8 }, { id: 101, name: "القارعة", verses: 11 },
            { id: 100, name: "العاديات", verses: 11 }, { id: 99, name: "الزلزلة", verses: 8 },
            { id: 98, name: "البينة", verses: 8 }, { id: 97, name: "القدر", verses: 5 },
            { id: 96, name: "العلق", verses: 19 }, { id: 95, name: "التين", verses: 8 },
            { id: 94, name: "الشرح", verses: 8 }, { id: 93, name: "الضحى", verses: 11 },
            { id: 92, name: "الليل", verses: 21 }, { id: 91, name: "الشمس", verses: 15 },
            { id: 90, name: "البلد", verses: 20 }, { id: 89, name: "الفجر", verses: 30 },
            { id: 88, name: "الغاشية", verses: 26 }, { id: 87, name: "الأعلى", verses: 19 },
            { id: 86, name: "الطارق", verses: 17 }, { id: 85, name: "البروج", verses: 22 },
            { id: 84, name: "الانشقاق", verses: 25 }, { id: 83, name: "المطففين", verses: 36 },
            { id: 82, name: "الانفطار", verses: 19 }, { id: 81, name: "التكوير", verses: 29 },
            { id: 80, name: "عبس", verses: 42 }, { id: 79, name: "النازعات", verses: 46 },
            { id: 78, name: "النبأ", verses: 40 }
        ];

        let progress = JSON.parse(localStorage.getItem('quran_progress')) || {};
        let studentData = JSON.parse(localStorage.getItem('student_info')) || { name: '', level: '' };
        let currentTargetSurah = null;
        let currentFilter = 'all';

        function init() {
            document.getElementById('studentName').value = studentData.name || "";
            document.getElementById('studentLevel').value = studentData.level || "";
            renderSurahs();
            updateGlobalProgress();
        }

        function saveAllData() {
            studentData = {
                name: document.getElementById('studentName').value,
                level: document.getElementById('studentLevel').value
            };
            localStorage.setItem('student_info', JSON.stringify(studentData));
            localStorage.setItem('quran_progress', JSON.stringify(progress));
        }

        function handleSearch(term) {
            const filtered = surahs.filter(s => s.name.includes(term));
            renderSurahs(filtered);
        }

        function filterSurahs(type) {
            currentFilter = type;
            renderSurahs();
        }

        function renderSurahs(data = null) {
            const container = document.getElementById('surah-container');
            container.innerHTML = '';
            
            let source = data || surahs;
            
            if (currentFilter === 'completed') {
                source = source.filter(s => progress[s.id]?.saved);
            }

            source.forEach(surah => {
                const state = progress[surah.id] || { saved: false, mastery: 0, badge: null };
                const card = document.createElement('div');
                card.id = `card-${surah.id}`;
                card.className = `surah-card bg-white p-5 rounded-2xl shadow-sm relative ${state.saved ? 'border-emerald-200 ring-1 ring-emerald-100' : 'opacity-80'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-3">
                             <div class="text-3xl ${state.badge ? 'badge-pulse' : 'opacity-0'} transition-opacity" id="surah-badge-${surah.id}">
                                ${state.badge || '⭐'}
                             </div>
                             <div>
                                <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded mb-1 inline-block no-print">سورة ${surah.id}</span>
                                <h3 class="text-xl font-bold quran-font">سورة ${surah.name}</h3>
                             </div>
                        </div>
                        <div class="flex flex-col gap-2 items-end no-print">
                             <input type="checkbox" id="check-${surah.id}" ${state.saved ? 'checked' : ''} onchange="toggleSaved(${surah.id})" class="hidden custom-checkbox">
                             <label for="check-${surah.id}" class="cursor-pointer px-3 py-1.5 rounded-lg bg-gray-100 text-gray-500 text-[10px] font-bold transition-all hover:bg-gray-200">
                                ${state.saved ? 'محفوظ ✓' : 'لم يحفظ'}
                             </label>
                             <button onclick="openBadgeModal(${surah.id})" class="text-[10px] text-yellow-600 font-bold flex items-center gap-1 hover:underline">
                                <span>تحفيز</span> 🎁
                             </button>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] mb-1 text-gray-400">
                            <span>الإتقان</span>
                            <span id="mastery-text-${surah.id}">${state.mastery}%</span>
                        </div>
                        <input type="range" min="0" max="100" value="${state.mastery}" 
                               oninput="updateMasteryUI(${surah.id}, this.value)" 
                               onchange="updateMasteryFinal(${surah.id}, this.value)"
                               class="w-full h-1 bg-gray-100 rounded-lg appearance-none accent-emerald-500 no-print">
                    </div>
                    <div class="mt-3 flex gap-0.5 justify-center" id="stars-container-${surah.id}">
                        ${renderStars(state.mastery)}
                    </div>
                    <div class="mt-2 text-center no-print">
                        <button onclick="getSurahFullInfo('${surah.name}')" class="text-[9px] text-emerald-400 hover:text-emerald-600 transition font-bold">استكشاف وتفسير ✨</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Mastery Updates
        function updateMasteryUI(id, val) {
            document.getElementById(`mastery-text-${id}`).innerText = val + '%';
            document.getElementById(`stars-container-${id}`).innerHTML = renderStars(val);
        }

        function updateMasteryFinal(id, val) {
            if (!progress[id]) progress[id] = { saved: false, mastery: 0, badge: null };
            progress[id].mastery = parseInt(val);
            if (val > 0 && !progress[id].saved) {
                progress[id].saved = true;
                const card = document.getElementById(`card-${id}`);
                card.classList.add('border-emerald-200', 'ring-1', 'ring-emerald-100');
                card.classList.remove('opacity-80');
                const checkbox = document.getElementById(`check-${id}`);
                if (checkbox) checkbox.checked = true;
                const label = document.querySelector(`label[for="check-${id}"]`);
                if (label) label.innerText = 'محفوظ ✓';
                updateGlobalProgress();
            }
            saveAllData();
        }

        function openBadgeModal(surahId) {
            currentTargetSurah = surahId;
            const surah = surahs.find(s => s.id === surahId);
            document.getElementById('badge-modal-title').innerText = `تحفيز سورة ${surah.name}`;
            document.getElementById('badge-modal').classList.remove('hidden');
        }

        function closeBadgeModal() {
            document.getElementById('badge-modal').classList.add('hidden');
            currentTargetSurah = null;
        }

        function assignBadgeToSurah(icon) {
            if (currentTargetSurah) {
                if (!progress[currentTargetSurah]) progress[currentTargetSurah] = { saved: false, mastery: 0 };
                progress[currentTargetSurah].badge = icon;
                saveAllData();
                renderSurahs(); 
                closeBadgeModal();
            }
        }

        function renderStars(percent) {
            let s = ''; 
            const count = Math.ceil(percent / 20);
            for(let i=1; i<=5; i++) {
                s += `<span class="${i <= count ? 'text-yellow-400' : 'text-gray-200'} text-xs">★</span>`;
            }
            return s;
        }

        function toggleSaved(id) {
            if (!progress[id]) progress[id] = { saved: false, mastery: 0, badge: null };
            progress[id].saved = !progress[id].saved;
            if (progress[id].saved && progress[id].mastery === 0) {
                progress[id].mastery = 100;
            } else if (!progress[id].saved) {
                progress[id].mastery = 0;
            }
            saveAllData();
            updateGlobalProgress();
            renderSurahs();
        }

        function updateGlobalProgress() {
            const saved = Object.values(progress).filter(p => p.saved).length;
            const percent = Math.round((saved / surahs.length) * 100);
            document.getElementById('total-percent').innerText = percent + '%';
            document.getElementById('total-progress-bar').style.width = percent + '%';
        }

        function exportToPDF() {
            const element = document.getElementById('capture-area');
            const opt = {
                margin: 0.5,
                filename: `تقرير_حفظ_${studentData.name || 'طالب'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function clearProgress() {
            if (confirm("هل تريد مسح كل البيانات والبدء من جديد؟")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- AI Deep Logic ---
        async function geminiAIStructured(surahName) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `أجب بتنسيق JSON حصرياً حول سورة ${surahName} من جزء عم. البيانات المطلوبة:
            {
                "type": "مكية أو مدنية",
                "tafsir": "تفسير ميسر جداً ومختصر للأطفال (فقرة واحدة)",
                "reason": "سبب النزول باختصار (إن وجد، وإلا اذكر فضلها أو موضوعها الأساسي)",
                "tips": "نصيحة عملية ذكية جداً لتسهيل حفظ هذه السورة تحديداً"
            }`;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const result = await response.json();
                return JSON.parse(result.candidates[0].content.parts[0].text);
            } catch (e) { 
                console.error(e);
                return {
                    type: "غير متوفر",
                    tafsir: "تحدث السورة عن عظمة الله واليوم الآخر. يُنصح بتكرارها مع الاستماع للقارئ.",
                    reason: "نزلت في مكة المكرمة لبيان الحق للناس.",
                    tips: "قم بتقسيم السورة إلى مقاطع بحسب المعاني لتسهيل الحفظ."
                };
            }
        }

        async function getSurahFullInfo(surahName) {
            const loading = document.getElementById('ai-loading');
            const content = document.getElementById('ai-content-container');
            const modal = document.getElementById('ai-modal');

            loading.classList.remove('hidden');
            content.classList.add('hidden');
            modal.classList.remove('hidden');

            document.getElementById('ai-modal-surah-name').innerText = `سورة ${surahName}`;

            const data = await geminiAIStructured(surahName);

            document.getElementById('ai-modal-type').innerText = data.type;
            document.getElementById('ai-content-tafsir').innerText = data.tafsir;
            document.getElementById('ai-content-reason').innerText = data.reason;
            document.getElementById('ai-content-tips').innerText = data.tips;

            loading.classList.add('hidden');
            content.classList.remove('hidden');
        }

        function closeAIModal() { document.getElementById('ai-modal').classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
