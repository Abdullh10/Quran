<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة حفظ جزء عم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f4f8;
            color: #2d3748;
        }
        .quran-font {
            font-family: 'Amiri', serif;
        }
        .surah-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .surah-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .custom-checkbox:checked + label {
            background-color: #48bb78;
            color: white;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-emerald-700 text-white py-10 px-4 shadow-lg mb-8 relative overflow-hidden">
        <div class="max-w-6xl mx-auto relative z-10">
            <div class="flex flex-col lg:flex-row justify-between items-center gap-8">
                
                <!-- Student Info -->
                <div class="flex flex-col md:flex-row gap-4 w-full lg:w-auto">
                    <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md flex-1">
                        <label class="block text-xs text-emerald-200 mb-1">اسم الطالب</label>
                        <input type="text" id="studentName" oninput="saveStudentData()" placeholder="اكتب اسمك هنا..." 
                               class="bg-transparent border-b border-emerald-400 focus:border-yellow-400 outline-none w-full text-xl font-bold placeholder:text-emerald-300">
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md min-w-[150px]">
                        <label class="block text-xs text-emerald-200 mb-1">المرحلة الدراسية</label>
                        <input type="text" id="studentLevel" oninput="saveStudentData()" placeholder="مثلاً: الصف الخامس" 
                               class="bg-transparent border-b border-emerald-400 focus:border-yellow-400 outline-none w-full text-lg placeholder:text-emerald-300">
                    </div>
                </div>

                <!-- Title & Global Progress -->
                <div class="text-center">
                    <h1 class="text-4xl md:text-5xl font-extrabold mb-4 quran-font">مُتابعة حفظ جُزء عمّ</h1>
                    <div class="bg-white/10 p-5 rounded-2xl backdrop-blur-sm inline-block min-w-[300px]">
                        <div class="flex justify-between mb-2 items-center">
                            <span class="text-sm font-bold">الإنجاز الكلي للجزء</span>
                            <span id="total-percent" class="text-2xl font-black">0%</span>
                        </div>
                        <div class="w-full bg-white/20 rounded-full h-4">
                            <div id="total-progress-bar" class="bg-yellow-400 h-4 rounded-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <p class="text-xs mt-2 text-emerald-200" id="stats-text">لم يتم البدء بعد</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- Decorative Circle -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-emerald-600 rounded-full opacity-50"></div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <!-- Search & Filters -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="relative w-full md:w-96">
                <input type="text" id="searchSurah" placeholder="ابحث عن سورة..." class="w-full p-3 pr-10 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-emerald-500">
                <span class="absolute right-3 top-3 text-gray-400">🔍</span>
            </div>
            <div class="flex gap-2">
                <button onclick="filterSurahs('all')" class="px-4 py-2 bg-white rounded-lg shadow-sm hover:bg-emerald-50 text-sm font-bold border border-transparent focus:border-emerald-500">الكل</button>
                <button onclick="filterSurahs('completed')" class="px-4 py-2 bg-white rounded-lg shadow-sm hover:bg-emerald-50 text-sm font-bold text-emerald-600 border border-transparent focus:border-emerald-500">المحفوظ</button>
                <button onclick="filterSurahs('pending')" class="px-4 py-2 bg-white rounded-lg shadow-sm hover:bg-emerald-50 text-sm font-bold text-orange-600 border border-transparent focus:border-emerald-500">قيد الحفظ</button>
            </div>
        </div>

        <!-- Surahs Grid -->
        <div id="surah-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected by JS -->
        </div>
    </main>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-4">🎊</div>
            <h2 class="text-2xl font-bold mb-2 text-emerald-700">مبارك الحفظ!</h2>
            <p class="text-gray-600 mb-6" id="modal-msg"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition">استمرار</button>
        </div>
    </div>

    <script>
        const surahs = [
            { id: 78, name: "النبأ", verses: 40 }, { id: 79, name: "النازعات", verses: 46 },
            { id: 80, name: "عبس", verses: 42 }, { id: 81, name: "التكوير", verses: 29 },
            { id: 82, name: "الانفطار", verses: 19 }, { id: 83, name: "المطففين", verses: 36 },
            { id: 84, name: "الانشقاق", verses: 25 }, { id: 85, name: "البروج", verses: 22 },
            { id: 86, name: "الطارق", verses: 17 }, { id: 87, name: "الأعلى", verses: 19 },
            { id: 88, name: "الغاشية", verses: 26 }, { id: 89, name: "الفجر", verses: 30 },
            { id: 90, name: "البلد", verses: 20 }, { id: 91, name: "الشمس", verses: 15 },
            { id: 92, name: "الليل", verses: 21 }, { id: 93, name: "الضحى", verses: 11 },
            { id: 94, name: "الشرح", verses: 8 }, { id: 95, name: "التين", verses: 8 },
            { id: 96, name: "العلق", verses: 19 }, { id: 97, name: "القدر", verses: 5 },
            { id: 98, name: "البينة", verses: 8 }, { id: 99, name: "الزلزلة", verses: 8 },
            { id: 100, name: "العاديات", verses: 11 }, { id: 101, name: "القارعة", verses: 11 },
            { id: 102, name: "التكاثر", verses: 8 }, { id: 103, name: "العصر", verses: 3 },
            { id: 104, name: "الهمزة", verses: 9 }, { id: 105, name: "الفيل", verses: 5 },
            { id: 106, name: "قريش", verses: 4 }, { id: 107, name: "الماعون", verses: 7 },
            { id: 108, name: "الكوثر", verses: 3 }, { id: 109, name: "الكافرون", verses: 6 },
            { id: 110, name: "النصر", verses: 3 }, { id: 111, name: "المسد", verses: 5 },
            { id: 112, name: "الإخلاص", verses: 4 }, { id: 113, name: "الفلق", verses: 5 },
            { id: 114, name: "الناس", verses: 6 }
        ];

        let progress = JSON.parse(localStorage.getItem('quran_progress')) || {};
        let studentData = JSON.parse(localStorage.getItem('student_info')) || { name: '', level: '' };

        function init() {
            // Load student info
            document.getElementById('studentName').value = studentData.name;
            document.getElementById('studentLevel').value = studentData.level;
            
            renderSurahs(surahs);
            updateGlobalProgress();
        }

        function saveStudentData() {
            const data = {
                name: document.getElementById('studentName').value,
                level: document.getElementById('studentLevel').value
            };
            localStorage.setItem('student_info', JSON.stringify(data));
        }

        function renderSurahs(data) {
            const container = document.getElementById('surah-container');
            container.innerHTML = '';
            
            data.forEach(surah => {
                const state = progress[surah.id] || { saved: false, mastery: 0 };
                const card = document.createElement('div');
                card.className = `surah-card bg-white p-6 rounded-2xl shadow-sm relative ${state.saved ? 'border-emerald-200' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md mb-1 inline-block">سورة رقم ${surah.id}</span>
                            <h3 class="text-2xl font-bold quran-font">${surah.name}</h3>
                            <p class="text-xs text-gray-400">${surah.verses} آية</p>
                        </div>
                        <div class="flex items-center gap-2">
                             <input type="checkbox" id="check-${surah.id}" ${state.saved ? 'checked' : ''} 
                                    onchange="toggleSaved(${surah.id})" 
                                    class="hidden custom-checkbox">
                             <label for="check-${surah.id}" class="cursor-pointer px-4 py-2 rounded-xl bg-gray-100 text-gray-500 text-xs font-bold transition-all hover:bg-gray-200">
                                ${state.saved ? 'تم الحفظ ✓' : 'لم تُحفظ'}
                             </label>
                        </div>
                    </div>

                    <div class="mt-6">
                        <div class="flex justify-between text-xs mb-2 text-gray-500 font-bold">
                            <span>نسبة الإتقان</span>
                            <span>${state.mastery}%</span>
                        </div>
                        <input type="range" min="0" max="100" value="${state.mastery}" 
                               oninput="updateMastery(${surah.id}, this.value)"
                               class="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    </div>

                    <div class="mt-4 flex gap-1 justify-center">
                        ${renderStars(state.mastery)}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderStars(percent) {
            let stars = '';
            const count = Math.ceil(percent / 20);
            for(let i=1; i<=5; i++) {
                stars += `<span class="${i <= count ? 'text-yellow-400' : 'text-gray-200'} text-xl">★</span>`;
            }
            return stars;
        }

        function toggleSaved(id) {
            if (!progress[id]) progress[id] = { saved: false, mastery: 0 };
            progress[id].saved = !progress[id].saved;
            if (progress[id].saved && progress[id].mastery === 0) progress[id].mastery = 100;
            
            saveAndRefresh();

            if (progress[id].saved) {
                const name = document.getElementById('studentName').value || 'يا بطل';
                showModal(`بارك الله فيك يا ${name}، تم حفظ سورة ${surahs.find(s => s.id === id).name}!`);
            }
        }

        function updateMastery(id, val) {
            if (!progress[id]) progress[id] = { saved: false, mastery: 0 };
            progress[id].mastery = parseInt(val);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('quran_progress', JSON.stringify(progress));
            updateGlobalProgress();
            const searchVal = document.getElementById('searchSurah').value;
            filterSurahs('all', searchVal);
        }

        function updateGlobalProgress() {
            const totalSurahs = surahs.length;
            const savedSurahs = Object.values(progress).filter(p => p.saved).length;
            const percent = totalSurahs > 0 ? Math.round((savedSurahs / totalSurahs) * 100) : 0;
            
            document.getElementById('total-percent').innerText = percent + '%';
            document.getElementById('total-progress-bar').style.width = percent + '%';
            document.getElementById('stats-text').innerText = `تم حفظ ${savedSurahs} سورة من أصل ${totalSurahs}`;
        }

        document.getElementById('searchSurah').addEventListener('input', (e) => {
            filterSurahs('all', e.target.value);
        });

        function filterSurahs(type, query = '') {
            const filtered = surahs.filter(s => {
                const matchesSearch = s.name.includes(query);
                const state = progress[s.id] || { saved: false };
                
                if (type === 'completed') return matchesSearch && state.saved;
                if (type === 'pending') return matchesSearch && !state.saved;
                return matchesSearch;
            });
            renderSurahs(filtered);
        }

        function showModal(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('success-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('success-modal').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
