<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متابعة حفظ جزء عم - نسخة الجوال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }
        .quran-font { font-family: 'Amiri', serif; }
        
        /* Mobile Optimized Cards */
        .surah-card {
            transition: transform 0.2s;
            border: 1px solid #e2e8f0;
        }
        .surah-card:active {
            transform: scale(0.98);
        }

        /* Touch-friendly inputs */
        input[type="number"], select {
            font-size: 16px !important; /* Prevents iOS zoom on focus */
        }

        /* Custom Checkbox */
        .custom-checkbox:checked + label {
            background-color: #059669;
            color: white;
            border-color: #059669;
        }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="capture-area">
        <!-- Optimized Header for Mobile -->
        <header class="bg-emerald-800 text-white pt-6 pb-10 px-4 rounded-b-[2.5rem] shadow-xl">
            <div class="max-w-md mx-auto text-center">
                <h1 class="text-2xl font-black mb-1 quran-font">مُتابعة جُزء عمّ</h1>
                <p class="text-[10px] opacity-80 mb-6">رفيقك الذكي في رحلة الحفظ</p>

                <!-- Student Quick Info -->
                <div class="grid grid-cols-2 gap-2 mb-6 no-print">
                    <input type="text" id="studentName" oninput="saveAllData()" placeholder="الاسم" 
                           class="bg-white/10 border-none rounded-xl p-2 text-xs text-center placeholder:text-white/50 focus:ring-1 focus:ring-yellow-400">
                    <input type="text" id="studentLevel" oninput="saveAllData()" placeholder="المرحلة" 
                           class="bg-white/10 border-none rounded-xl p-2 text-xs text-center placeholder:text-white/50 focus:ring-1 focus:ring-yellow-400">
                </div>

                <!-- Global Progress Container -->
                <div class="bg-white/15 backdrop-blur-md rounded-3xl p-4 border border-white/10">
                    <div class="flex justify-between items-center mb-2 px-1">
                        <span class="text-[10px] font-bold">الإنجاز الكلي</span>
                        <span id="total-percent" class="text-lg font-black">0%</span>
                    </div>
                    <div class="w-full bg-black/20 rounded-full h-2">
                        <div id="total-progress-bar" class="bg-yellow-400 h-2 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 -mt-6">
            
            <!-- Daily Ward - Mobile Card Style -->
            <section class="mb-8 no-print">
                <div class="bg-white rounded-3xl p-5 shadow-lg border border-emerald-50">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">🔥</span>
                            <div class="leading-none">
                                <div class="text-xl font-black text-emerald-800" id="streakCount">0</div>
                                <div class="text-[9px] text-gray-400 font-bold uppercase">أيام متتالية</div>
                            </div>
                        </div>
                        <div class="text-left">
                            <button onclick="exportToPDF()" class="p-2 bg-slate-100 rounded-full text-sm">📄</button>
                        </div>
                    </div>

                    <h2 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                        ورد اليوم 📅
                    </h2>

                    <div id="ward-list" class="space-y-2 mb-4">
                        <!-- Ward Items -->
                    </div>

                    <div class="flex gap-2">
                        <button onclick="addNewWardItem()" class="flex-1 py-3 bg-emerald-50 text-emerald-700 rounded-2xl text-[11px] font-bold border border-emerald-100">
                            + إضافة سورة
                        </button>
                        <button id="btnCompleteWard" onclick="markWardComplete()" class="flex-[2] py-3 bg-emerald-600 text-white rounded-2xl text-[11px] font-bold shadow-md active:bg-emerald-700">
                            تم الإنجاز 🎉
                        </button>
                    </div>
                </div>
            </section>

            <!-- Sticky Search/Filter Bar -->
            <div class="sticky top-4 z-30 mb-6 space-y-2 no-print">
                <div class="relative shadow-md">
                    <input type="text" id="searchSurah" oninput="handleSearch(this.value)" placeholder="ابحث عن سورة..." 
                           class="w-full p-3 pr-10 rounded-2xl border-none focus:ring-2 focus:ring-emerald-500 text-sm shadow-inner">
                    <span class="absolute right-3 top-3 text-gray-400">🔍</span>
                </div>
                <div class="flex gap-1 overflow-x-auto pb-1 no-scrollbar">
                    <button onclick="filterSurahs('all')" class="whitespace-nowrap px-4 py-2 bg-white rounded-xl shadow-sm text-[10px] font-bold border border-slate-100">الكل</button>
                    <button onclick="filterSurahs('completed')" class="whitespace-nowrap px-4 py-2 bg-white rounded-xl shadow-sm text-[10px] font-bold text-emerald-600 border border-emerald-50">المحفوظ ✅</button>
                    <button onclick="clearProgress()" class="whitespace-nowrap px-4 py-2 bg-red-50 rounded-xl shadow-sm text-[10px] font-bold text-red-500 border border-red-100">تصفير</button>
                </div>
            </div>

            <!-- Surahs Grid (Single Column for Mobile) -->
            <div id="surah-container" class="space-y-4 pb-10">
                <!-- Cards injected here -->
            </div>
        </main>
    </div>

    <!-- Mobile Modals (Simplified) -->
    <div id="badge-modal" class="fixed inset-0 bg-black/60 hidden flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-3xl p-6 w-full max-w-sm animate-slide-up shadow-2xl">
            <h2 class="text-lg font-bold text-slate-800 mb-6 text-center">اختر وساماً للسورة 🎁</h2>
            <div class="grid grid-cols-4 gap-4 mb-8">
                <button onclick="assignBadgeToSurah('⭐')" class="aspect-square bg-slate-50 rounded-2xl text-2xl">⭐</button>
                <button onclick="assignBadgeToSurah('🏆')" class="aspect-square bg-slate-50 rounded-2xl text-2xl">🏆</button>
                <button onclick="assignBadgeToSurah('💎')" class="aspect-square bg-slate-50 rounded-2xl text-2xl">💎</button>
                <button onclick="assignBadgeToSurah('🎯')" class="aspect-square bg-slate-50 rounded-2xl text-2xl">🎯</button>
            </div>
            <button onclick="closeBadgeModal()" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">إلغاء</button>
        </div>
    </div>

    <div id="ai-modal" class="fixed inset-0 bg-black/60 hidden flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-3xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto animate-slide-up shadow-2xl">
            <div id="ai-loading" class="py-10 text-center hidden">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-600 mx-auto"></div>
            </div>
            <div id="ai-content-container" class="hidden">
                <div class="flex items-center gap-3 mb-6">
                    <span class="text-3xl" id="ai-modal-icon">📖</span>
                    <div>
                        <h2 id="ai-modal-surah-name" class="text-xl font-bold text-slate-800 quran-font"></h2>
                        <span id="ai-modal-type" class="text-[9px] bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full font-bold"></span>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="bg-emerald-50 p-4 rounded-2xl"><h4 class="text-xs font-bold text-emerald-700 mb-1">تفسير ميسر</h4><p id="ai-content-tafsir" class="text-xs text-slate-600 leading-relaxed"></p></div>
                    <div class="bg-amber-50 p-4 rounded-2xl"><h4 class="text-xs font-bold text-amber-700 mb-1">سبب النزول</h4><p id="ai-content-reason" class="text-xs text-slate-600 leading-relaxed"></p></div>
                    <div class="bg-sky-50 p-4 rounded-2xl"><h4 class="text-xs font-bold text-sky-700 mb-1">نصيحة الحفظ</h4><p id="ai-content-tips" class="text-xs text-slate-600 italic"></p></div>
                </div>
                <button onclick="closeAIModal()" class="w-full mt-6 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        const surahs = [
            { id: 114, name: "الناس", verses: 6 }, { id: 113, name: "الفلق", verses: 5 },
            { id: 112, name: "الإخلاص", verses: 4 }, { id: 111, name: "المسد", verses: 5 },
            { id: 110, name: "النصر", verses: 3 }, { id: 109, name: "الكافرون", verses: 6 },
            { id: 108, name: "الكوثر", verses: 3 }, { id: 107, name: "الماعون", verses: 7 },
            { id: 106, name: "قريش", verses: 4 }, { id: 105, name: "الفيل", verses: 5 },
            { id: 104, name: "الهمزة", verses: 9 }, { id: 103, name: "العصر", verses: 3 },
            { id: 102, name: "التكاثر", verses: 8 }, { id: 101, name: "القارعة", verses: 11 },
            { id: 100, name: "العاديات", verses: 11 }, { id: 99, name: "الزلزلة", verses: 8 },
            { id: 98, name: "البينة", verses: 8 }, { id: 97, name: "القدر", verses: 5 },
            { id: 96, name: "العلق", verses: 19 }, { id: 95, name: "التين", verses: 8 },
            { id: 94, name: "الشرح", verses: 8 }, { id: 93, name: "الضحى", verses: 11 },
            { id: 92, name: "الليل", verses: 21 }, { id: 91, name: "الشمس", verses: 15 },
            { id: 90, name: "البلد", verses: 20 }, { id: 89, name: "الفجر", verses: 30 },
            { id: 88, name: "الغاشية", verses: 26 }, { id: 87, name: "الأعلى", verses: 19 },
            { id: 86, name: "الطارق", verses: 17 }, { id: 85, name: "البروج", verses: 22 },
            { id: 84, name: "الانشقاق", verses: 25 }, { id: 83, name: "المطففين", verses: 36 },
            { id: 82, name: "الانفطار", verses: 19 }, { id: 81, name: "التكوير", verses: 29 },
            { id: 80, name: "عبس", verses: 42 }, { id: 79, name: "النازعات", verses: 46 },
            { id: 78, name: "النبأ", verses: 40 }
        ];

        let progress = JSON.parse(localStorage.getItem('quran_progress')) || {};
        let studentData = JSON.parse(localStorage.getItem('student_info')) || { name: '', level: '' };
        let multiWard = JSON.parse(localStorage.getItem('multi_ward_list')) || [{ id: Date.now(), surahId: 114, vFrom: 1, vTo: 6 }];
        let streakData = JSON.parse(localStorage.getItem('streak_data')) || { streak: 0, lastDate: null };

        function init() {
            document.getElementById('studentName').value = studentData.name;
            document.getElementById('studentLevel').value = studentData.level;
            document.getElementById('streakCount').innerText = streakData.streak;
            renderWardList();
            renderSurahs();
            updateGlobalProgress();
            checkWardStatus();
        }

        // UI Helpers
        function renderWardList() {
            const container = document.getElementById('ward-list');
            container.innerHTML = '';
            multiWard.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100";
                div.innerHTML = `
                    <select onchange="updateWardItem(${item.id}, 'surahId', this.value)" class="flex-1 bg-transparent border-none text-[11px] font-bold">
                        ${surahs.map(s => `<option value="${s.id}" ${s.id == item.surahId ? 'selected' : ''}>سورة ${s.name}</option>`).join('')}
                    </select>
                    <div class="flex items-center gap-1">
                        <input type="number" value="${item.vFrom}" oninput="updateWardItem(${item.id}, 'vFrom', this.value)" class="w-10 p-1 rounded-lg text-center text-xs bg-white border border-slate-200">
                        <span class="text-[10px]">-</span>
                        <input type="number" value="${item.vTo}" oninput="updateWardItem(${item.id}, 'vTo', this.value)" class="w-10 p-1 rounded-lg text-center text-xs bg-white border border-slate-200">
                    </div>
                    <button onclick="removeWardItem(${item.id})" class="p-1 text-red-400">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function addNewWardItem() {
            multiWard.push({ id: Date.now(), surahId: 114, vFrom: 1, vTo: 5 });
            saveWardData();
            renderWardList();
        }

        function updateWardItem(id, field, val) {
            const i = multiWard.findIndex(x => x.id === id);
            if(i > -1) multiWard[i][field] = parseInt(val);
            saveWardData();
        }

        function removeWardItem(id) {
            if(multiWard.length > 1) {
                multiWard = multiWard.filter(x => x.id !== id);
                saveWardData();
                renderWardList();
            }
        }

        function renderSurahs(data = null) {
            const container = document.getElementById('surah-container');
            container.innerHTML = '';
            let source = data || surahs;
            source.forEach(surah => {
                const s = progress[surah.id] || { saved: false, mastery: 0, badge: null };
                const div = document.createElement('div');
                div.className = `surah-card bg-white p-4 rounded-3xl shadow-sm ${s.saved ? 'border-emerald-200' : 'opacity-90'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex gap-3 items-center">
                            <span class="text-2xl">${s.badge || '📖'}</span>
                            <div>
                                <h3 class="text-sm font-black quran-font">سورة ${surah.name}</h3>
                                <p class="text-[9px] text-slate-400">عدد الآيات: ${surah.verses}</p>
                            </div>
                        </div>
                        <div class="flex gap-1 no-print">
                            <button onclick="getSurahFullInfo('${surah.name}')" class="p-2 bg-slate-50 rounded-xl text-xs">ℹ️</button>
                            <input type="checkbox" id="c-${surah.id}" ${s.saved ? 'checked' : ''} onchange="toggleSaved(${surah.id})" class="hidden custom-checkbox">
                            <label for="c-${surah.id}" class="px-3 py-2 bg-slate-100 rounded-xl text-[10px] font-bold border border-transparent">حفظ</label>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="range" min="0" max="100" value="${s.mastery}" onchange="updateMastery(${surah.id}, this.value)" class="flex-1 h-1 bg-slate-100 accent-emerald-600 appearance-none rounded">
                        <span class="text-[10px] font-bold text-slate-400">${s.mastery}%</span>
                        <button onclick="openBadgeModal(${surah.id})" class="text-xs no-print">🎁</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Logic functions
        function saveAllData() {
            studentData = { name: document.getElementById('studentName').value, level: document.getElementById('studentLevel').value };
            localStorage.setItem('student_info', JSON.stringify(studentData));
            localStorage.setItem('quran_progress', JSON.stringify(progress));
        }

        function saveWardData() { localStorage.setItem('multi_ward_list', JSON.stringify(multiWard)); }

        function toggleSaved(id) {
            if(!progress[id]) progress[id] = { saved: false, mastery: 0 };
            progress[id].saved = !progress[id].saved;
            progress[id].mastery = progress[id].saved ? 100 : 0;
            saveAllData(); renderSurahs(); updateGlobalProgress();
        }

        function updateMastery(id, val) {
            if(!progress[id]) progress[id] = { saved: false, mastery: 0 };
            progress[id].mastery = parseInt(val);
            if(val > 0) progress[id].saved = true;
            saveAllData(); renderSurahs(); updateGlobalProgress();
        }

        function updateGlobalProgress() {
            const count = Object.values(progress).filter(p => p.saved).length;
            const pct = Math.round((count / surahs.length) * 100);
            document.getElementById('total-percent').innerText = pct + '%';
            document.getElementById('total-progress-bar').style.width = pct + '%';
        }

        function markWardComplete() {
            const today = new Date().toDateString();
            if(streakData.lastDate === today) return;
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            streakData.streak = (streakData.lastDate === yesterday.toDateString()) ? streakData.streak + 1 : 1;
            streakData.lastDate = today;
            localStorage.setItem('streak_data', JSON.stringify(streakData));
            init();
        }

        function checkWardStatus() {
            const today = new Date().toDateString();
            const btn = document.getElementById('btnCompleteWard');
            if(streakData.lastDate === today) {
                btn.disabled = true; btn.innerText = "إنجاز مكتمل ✅"; btn.className = "flex-[2] py-3 bg-emerald-800 text-white/50 rounded-2xl text-[11px] font-bold";
            }
        }

        function handleSearch(term) { renderSurahs(surahs.filter(s => s.name.includes(term))); }
        function filterSurahs(t) { renderSurahs(t === 'completed' ? surahs.filter(s => progress[s.id]?.saved) : surahs); }
        
        let currentSId = null;
        function openBadgeModal(id) { currentSId = id; document.getElementById('badge-modal').classList.remove('hidden'); }
        function closeBadgeModal() { document.getElementById('badge-modal').classList.add('hidden'); }
        function assignBadgeToSurah(b) { if(currentSId) { progress[currentSId].badge = b; saveAllData(); renderSurahs(); closeBadgeModal(); } }

        async function getSurahFullInfo(name) {
            const modal = document.getElementById('ai-modal');
            const loading = document.getElementById('ai-loading');
            const content = document.getElementById('ai-content-container');
            modal.classList.remove('hidden'); loading.classList.remove('hidden'); content.classList.add('hidden');
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `JSON info for Surah ${name} from Juz Amma: {type, tafsir, reason, tips}` }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = JSON.parse((await res.json()).candidates[0].content.parts[0].text);
                document.getElementById('ai-modal-surah-name').innerText = name;
                document.getElementById('ai-modal-type').innerText = data.type;
                document.getElementById('ai-content-tafsir').innerText = data.tafsir;
                document.getElementById('ai-content-reason').innerText = data.reason;
                document.getElementById('ai-content-tips').innerText = data.tips;
                loading.classList.add('hidden'); content.classList.remove('hidden');
            } catch(e) { modal.classList.add('hidden'); }
        }

        function closeAIModal() { document.getElementById('ai-modal').classList.add('hidden'); }
        function exportToPDF() { window.print(); }
        function clearProgress() { if(confirm("مسح الكل؟")) { localStorage.clear(); location.reload(); } }

        window.onload = init;
    </script>
</body>
</html>
